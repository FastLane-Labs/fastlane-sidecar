run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - govet
    - ineffassign
    - misspell
  disable-all: true

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-dirs:
    - vendor
    - third_party
  exclude-files:
    - ".*\\.pb\\.go$"
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - ineffassign
    # Exclude exitAfterDefer in cmd tools
    - path: cmd/
      linters:
        - gocritic
      text: "exitAfterDefer"
  # Maximum issues count per one linter
  max-issues-per-linter: 50
  # Maximum count of issues with the same text
  max-same-issues: 10